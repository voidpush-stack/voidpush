[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voidpush"
version = "1.0.0"
description = "VoidPush Python SDK — anonymous code contribution"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["voidpush", "anonymous", "git", "code-review", "privacy"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
    "Topic :: Security :: Cryptography",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
async = ["httpx[http2]>=0.27"]
dev   = ["pytest>=8", "pytest-asyncio>=0.23", "respx>=0.21", "ruff", "mypy"]

[project.urls]
Homepage = "https://voidpush.dev"
Repository = "https://github.com/voidpush-stack/voidpush"
Documentation = "https://voidpush.dev/docs/sdk"

[tool.hatch.envs.default]
features = ["dev"]

[tool.hatch.envs.default.scripts]
test   = "pytest tests/ -v"
lint   = "ruff check . && ruff format --check ."
format = "ruff format ."
types  = "mypy voidpush/"

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.mypy]
python_version = "3.12"
strict = true
